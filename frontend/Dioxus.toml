[application]
name = "UBSEDS GS"
title = "UBSEDS GS"
default_platform = "web"
out_dir = "dist"
# This folder is copied into the output dir after build/serve
asset_dir = "assets"
icon = "assets/icon.png"
category = "public.app-category.utilities"
build = "5"

[web.app]
title = "UBSEDS GS"

[web.watcher]
watch_path = ["src", "assets", "static"]
reload_html = true
index_on_404 = true

[web.wasm_opt]
level = "3"
debug = false

[bundle]
name = "UBSEDS GS"
identifier = "com.UBSEDS.GS26"
publisher = "UBSEDS"
resources = ["static/**/*", "assets/**/*"]
icon = [
    "icons/32x32.png",
    "icons/64x64.png",
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/256x256.png",
    "icons/icon.png",
    "icons/icon.icns",
    "icons/icon.ico",
]

[bundle.windows]
name = "UBSEDS GroundStation"
icon = "assets/icon.ico"

[bundle.macos]
# Used for BOTH macOS and iOS bundles
info_plist_path = "platform/macos/Info.plist"
icon = "icons/icon.icns"
minimum_system_version = "13.0"
hardened_runtime = true


[bundle.ios]
info_plist_path = "platform/macos/Info.plist"
icon = "assets/icon.png"
